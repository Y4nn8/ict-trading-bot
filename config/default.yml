# Default configuration for ICT Trading Bot

logging:
  level: INFO
  json_format: true

database:
  url: postgresql://trader:trader_secret@localhost:5432/trading_bot
  min_connections: 2
  max_connections: 10

broker:
  api_key: ""
  username: ""
  password: ""
  acc_number: ""
  acc_type: DEMO  # DEMO or LIVE

market_data:
  base_timeframe: M5
  higher_timeframes:
    - H1
    - H4
    - D1
  default_history_days: 180  # 6 months

instruments:
  - name: EUR/USD
    epic: CS.D.EURUSD.MINI.IP
    asset_class: forex
    leverage: 30
    min_size: 0.1  # IG API: minDealSize=0.1
    size_step: 0.1
    value_per_point: 1.0  # $1 per pip per contract (10k lot)
    point_currency: USD
    pip_size: 0.0001  # 1 pip = 0.0001
    min_spread: 0.6
    avg_spread: 0.8
    min_stop_distance: 5.0  # IG API: minStepDistance=5.0 (in pips)
  - name: GBP/USD
    epic: CS.D.GBPUSD.MINI.IP
    asset_class: forex
    leverage: 30
    min_size: 0.04  # IG API: minDealSize=0.04
    size_step: 0.04
    value_per_point: 1.0  # $1 per pip per contract (10k lot)
    point_currency: USD
    pip_size: 0.0001
    min_spread: 0.9
    avg_spread: 1.2
    min_stop_distance: 1.0  # IG API: minStepDistance=1.0 (in pips)
  - name: SPX500
    epic: IX.D.SPTRD.IFS.IP
    asset_class: index
    leverage: 20
    min_size: 1.0  # IG API: minDealSize=1.0
    size_step: 1.0
    value_per_point: 1.0  # £1 per point
    point_currency: GBP
    pip_size: 1.0  # 1 point = 1.0
    min_spread: 0.4
    avg_spread: 0.6
    min_stop_distance: 1.0  # IG API: minStepDistance=1.0 (in points)
  - name: DOW30
    epic: IX.D.DOW.IFS.IP
    asset_class: index
    leverage: 20
    min_size: 0.2  # IG API: minDealSize=0.2
    size_step: 0.2
    value_per_point: 1.0  # £1 per point
    point_currency: GBP
    pip_size: 1.0
    min_spread: 1.6
    avg_spread: 2.4
    min_stop_distance: 1.0  # IG API: minStepDistance=1.0 (in points)
  - name: DAX40
    epic: IX.D.DAX.IFE.IP
    asset_class: index
    leverage: 20
    min_size: 0.5  # IG API: minDealSize=0.5
    size_step: 0.5
    value_per_point: 1.0  # €1 per point
    pip_size: 1.0
    min_spread: 1.2
    avg_spread: 1.5
    min_stop_distance: 1.0  # IG API: minStepDistance=1.0 (in points)
  - name: NIKKEI225
    epic: IX.D.NIKKEI.IFM.IP
    asset_class: index
    leverage: 20
    min_size: 0.5  # IG API: minDealSize=0.5
    size_step: 0.5
    value_per_point: 1.0  # $1 per point
    point_currency: USD
    pip_size: 1.0
    min_spread: 7.0
    avg_spread: 10.0
    min_stop_distance: 1.0  # IG API: minStepDistance=1.0 (in points)
  - name: XAUUSD
    epic: CS.D.CFDGOLD.CFM.IP
    asset_class: commodity
    leverage: 10
    min_size: 0.1  # IG API: minDealSize=0.1
    size_step: 0.1
    value_per_point: 10.0  # $10 per point (10oz mini)
    point_currency: USD
    pip_size: 1.0  # 1 point = $1 in gold price
    min_spread: 0.3
    avg_spread: 0.5
    min_stop_distance: 1.0  # IG API: minStepDistance=1.0

risk:
  max_risk_per_trade_pct: 1.0  # % of capital
  max_daily_drawdown_pct: 3.0
  max_total_drawdown_pct: 10.0
  max_simultaneous_positions: 5
  confluence_risk_map:
    low: 0.5    # confluence < 0.4 -> 0.5% risk
    medium: 1.0  # 0.4 <= confluence < 0.7 -> 1.0%
    high: 2.0   # confluence >= 0.7 -> 2.0%

strategy:
  min_confluence_score: 0.4
  entry_timeout_candles: 6  # Cancel entry if not filled in N candles

backtest:
  walk_forward:
    train_months: 4
    test_months: 1
    step_months: 1
  simulation:
    slippage_max_pips: 2
    order_rejection_rate: 0.01

improvement:
  optuna:
    n_trials: 100
    min_improvement_pct: 2.0
    max_mdd_degradation_pct: 5.0
  llm:
    max_iterations: 5
    max_sharpe_jump_pct: 50.0

news:
  pre_event_pause_minutes: 30
  post_event_resume_minutes: 15
