# Fixed inner params — derived from step 2b WF analysis (15 windows, 3 val-positive)
# Reduces search space from 17 → 11 dimensions for better convergence with 100 trials.

# Entry threshold: only converged param (CV 5.6%, range 0.49-0.58, median 0.546)
entry_threshold: 0.55

# Sizing: gamma=1.0 (neutral), min_risk=1% capital floor, margin proba 85%+ = full engage
gamma: 1.0
min_risk_pct: 0.01
max_margin_proba: 0.85

# LightGBM regularization: safe defaults, not worth burning Optuna budget on these
subsample: 0.8
colsample_bytree: 0.8
